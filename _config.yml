# Profile settings
author:
  name: Sangeeta Bansal
  bio: >-
    <div id="bio">
    <p>
    Sangeeta Bansal is a Professor of Economics at the Centre for the Study of the World Economy (erstwhile the Centre for International Trade and Development),
    Jawaharlal Nehru University, Delhi, India, since 2010. She has served as the Chairperson of the Centre from 2008-2010 and 2022- 2024.
</p>
    Her research interests span a wide range of fields at the intersection of environment economics, energy economics, economic development, health and nutrition.  She has applied economic theory, 
    empirical and experimental methods in her research and published in leading field journals including Journal of Environmental Economics and Management, 
    Energy Economics, Agricultural Economics, Environment and Resource Economics, Environment and Development Economics, PLOS One, and Annual Review of Resource Economics. 
    She currently serves as the first woman editor of Agricultural Economics, the flagship journal of the International Association of Agricultural Economists, co-editor of Resource and Energy Economics 
    and on editorial boards of other reputed journals.
    </p>
    Professor Bansal is a recipient of several prestigious fellowships including Levenick Resident Scholar at the University of Illinois, Urbana Champaign, and 
    Fulbright-Nehru Senior Research Fellowship to visit the University of California, Berkeley, visiting professor fellowship from ETH-Zurich, and University of Melbourne.
    She has provided consultancy to IFPRI (Washington, D.C.), Vi UNCTAD, the South Asian Network for Development and Environmental Economics (SANDEE), and ICSSR on several research projects. She has served on a scientific panel of the Food Safety and Standards Authority of India. 
    She holds a PhD in Economics from the Indian Statistical Institute, Delhi Centre.She has served as the Chairperson of the Centre for International Trade and Development from 2008-2010,
    and has been an associate professor at the University since 2004.Sangeeta Bansal is a Professor of Economics at the Centre for International Trade and Development,
    Jawaharlal Nehru University since 2010.
    She visited the Department of Agricultural and Resource Economics, University of California,
    Berkeley in 2013-2014 and again in 2015.
    She has served as the Chairperson of the Centre for International Trade and Development from 2008-2010,
    and has been an associate professor at the University since 2004.
    </p>
    <p>
    She received her Masters in Economics from the Delhi School of Economics and her PhD in Economics from the
    Indian Statistical Institute.
    </p>

    <p>
    Her research interests are in environmental and agricultural policy, development economics, economics of technological change, information economics and micro-economic theory.
    </p>

    <p>
    She is an editor of Agricultural Economics. She is an Associate Editor of the journal Resource and Energy Economics, has been Editorial Board member
    of the journal Environmental and Development Economics, recipient of the 2008 ICSSR-NWO research grant,
    2004 European Summer School Grant, 2003 Grant for participating in the Environmental Economics and Policy Making
    at Goteborg University, Sweden. She has visited the economics department at the University of California,
    Berkeley, USA, Tilburg University, Netherlands, Goteborg University, Sweden, and the Indian Statistical Institute, India.
    </p>

    <p>
    Sangeeta was the recipient of Fulbright-Nehru Senior Research Fellowship 2013-14 to visit University of California, Berkeley.
    </p>

    <p>
    Sangeeta has provided consultancy to International Food Policy Research Institute, Washington D. C., USA, Vi UNCTAD, Geneva, and Ministry of Environment and Forests, India, SANDEE on several research projects.     </p>
    </p>
    </div>

