# Profile settings
author:
  name: Sangeeta Bansal
  bio: >-
    <div id="bio">
    <p>
    Sangeeta Bansal is a Professor of Economics at the Centre for the Study of the World Economy (erstwhile the Centre for International Trade and Development),
    Jawaharlal Nehru University, Delhi, India, since 2010. She has served as the Chairperson of the Centre from 2008-2010 and 2022- 2024.
</p>
    Her research interests span a wide range of fields at the intersection of environment economics, energy economics, economic development, health and nutrition.  She has applied economic theory, 
    empirical and experimental methods in her research and published in leading field journals including Journal of Environmental Economics and Management, 
    Energy Economics, Agricultural Economics, Environment and Resource Economics, Environment and Development Economics, PLOS One, and Annual Review of Resource Economics. 
    She currently serves as the first woman editor of Agricultural Economics, the flagship journal of the International Association of Agricultural Economists, co-editor of Resource and Energy Economics 
    and on editorial boards of other reputed journals.
    </p>
    Professor Bansal is a recipient of several prestigious fellowships including Levenick Resident Scholar at the University of Illinois, Urbana Champaign, and 
    Fulbright-Nehru Senior Research Fellowship to visit the University of California, Berkeley, Visiting Professor Fellowships from ETH-Zurich, 
    University of Melbourne, Tilburg University and Goteborg University. 
     <p>
    She has provided consultancy to IFPRI (Washington, D.C.), Vi UNCTAD, the South Asian Network for Development and Environmental Economics (SANDEE), and ICSSR on several research projects. She has served on a scientific panel of the Food Safety and Standards Authority of India. 
    She holds a PhD in Economics from the Indian Statistical Institute, Delhi Centre.
    </p>

    
    </div>
    

